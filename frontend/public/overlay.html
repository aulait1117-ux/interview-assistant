<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>面接ヒント</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }
    #app {
      width: 380px;
      min-height: 60px;
      max-height: 90vh;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(99, 102, 241, 0.5);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(99, 102, 241, 0.2);
      cursor: move;
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
    }
    #header span {
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    #close-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
    }
    #close-btn:hover { color: #f87171; }
    #opacity-control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      font-size: 11px;
    }
    #opacity-slider {
      width: 60px;
      accent-color: #6366f1;
    }
    #hint-area {
      padding: 12px;
      overflow-y: auto;
      max-height: calc(90vh - 44px);
    }
    .hint-item {
      background: rgba(30, 41, 59, 0.9);
      border-left: 3px solid #6366f1;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      animation: fadeIn 0.3s ease;
    }
    .hint-question {
      color: #94a3b8;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .hint-text {
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.5;
    }
    .waiting {
      color: #475569;
      font-size: 12px;
      text-align: center;
      padding: 16px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <span>💡 面接ヒント</span>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="opacity-control">
          <span>透明度</span>
          <input type="range" id="opacity-slider" min="20" max="100" value="85" />
        </div>
        <button id="close-btn" onclick="window.close()">✕</button>
      </div>
    </div>
    <div id="hint-area">
      <div class="waiting">面接官の質問を待っています...</div>
    </div>
  </div>

  <script>
    // 透明度スライダー
    document.getElementById('opacity-slider').addEventListener('input', (e) => {
      const val = e.target.value / 100;
      document.getElementById('app').style.background = `rgba(15, 23, 42, ${val})`;
    });

    // ドラッグ移動
    const header = document.getElementById('header');
    let isDragging = false, startX, startY;
    header.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.screenX - window.screenX;
      startY = e.screenY - window.screenY;
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      window.moveTo(e.screenX - startX, e.screenY - startY);
    });
    document.addEventListener('mouseup', () => isDragging = false);

    // BroadcastChannelでヒントを受信
    const channel = new BroadcastChannel('overlay-channel');
    const hintArea = document.getElementById('hint-area');
    let hasHint = false;

    channel.onmessage = (event) => {
      if (event.data.type !== 'hint') return;
      const { question, answer, streamingText, isStreaming } = event.data.data;
      const text = isStreaming ? streamingText : answer;
      if (!text) return;

      if (!hasHint) {
        hintArea.innerHTML = '';
        hasHint = true;
      }

      // ストリーミング中は最新アイテムを更新
      if (isStreaming) {
        let streaming = hintArea.querySelector('.streaming');
        if (!streaming) {
          streaming = document.createElement('div');
          streaming.className = 'hint-item streaming';
          hintArea.insertBefore(streaming, hintArea.firstChild);
        }
        streaming.innerHTML = `
          ${question ? `<div class="hint-question">Q: ${question}</div>` : ''}
          <div class="hint-text">${text}</div>
        `;
        return;
      }

      // 確定したヒントを追加
      const existing = hintArea.querySelector('.streaming');
      if (existing) existing.classList.remove('streaming');

      const item = document.createElement('div');
      item.className = 'hint-item';
      item.innerHTML = `
        ${question ? `<div class="hint-question">Q: ${question}</div>` : ''}
        <div class="hint-text">${text}</div>
      `;
      hintArea.insertBefore(item, hintArea.firstChild);
      while (hintArea.children.length > 5) {
        hintArea.removeChild(hintArea.lastChild);
      }
    };
  </script>
</body>
</html>
